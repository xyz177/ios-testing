name: Build Jailbreak DEB

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package identifier (e.g., com.yourrepo.ytkace)'
        required: true
        default: 'com.youtube.ytkace'
      package_version:
        description: 'Package version (e.g., 1.0.0)'
        required: true
        default: '0.6.5'
      maintainer:
        description: 'Maintainer name and email'
        required: true
        default: 'ace'
      description:
        description: 'Package description'
        required: true
        default: 'Tweak for YouTube'
      tweak_name:
        description: 'Main tweak name (for artifact naming)'
        required: true
        default: 'YTKACE'
      dylib_files:
        description: 'Space-separated list of dylib files (e.g., YTKACE.dylib or YTKACE.dylib libyt.dylib)'
        required: true
        default: 'YTKACE.dylib'
      bundle_zips:
        description: 'Space-separated list of bundle zip files (e.g., YTKACE.bundle.zip)'
        required: true
        default: 'YTKACE.bundle.zip'
      bundle_id:
        description: 'Bundle ID to inject into (e.g., com.google.ios.youtube)'
        required: true
        default: 'com.google.ios.youtube'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dpkg
      run: |
        echo "📦 Installing dpkg..."
        brew install dpkg
        echo "✅ dpkg installed"
        dpkg --version

    - name: Set environment variables
      run: |
        # Get inputs with fallbacks
        PACKAGE_NAME="${{ github.event.inputs.package_name }}"
        PACKAGE_VERSION="${{ github.event.inputs.package_version }}"
        MAINTAINER="${{ github.event.inputs.maintainer }}"
        DESCRIPTION="${{ github.event.inputs.description }}"
        TWEAK_NAME="${{ github.event.inputs.tweak_name }}"
        DYLIB_FILES="${{ github.event.inputs.dylib_files }}"
        BUNDLE_ZIPS="${{ github.event.inputs.bundle_zips }}"
        BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
        
        # Fallback defaults if inputs are empty
        if [ -z "$PACKAGE_NAME" ]; then PACKAGE_NAME="com.example.ytkace"; fi
        if [ -z "$PACKAGE_VERSION" ]; then PACKAGE_VERSION="1.0.0"; fi
        if [ -z "$MAINTAINER" ]; then MAINTAINER="Your Name <email@example.com>"; fi
        if [ -z "$DESCRIPTION" ]; then DESCRIPTION="Tweak for YouTube"; fi
        if [ -z "$TWEAK_NAME" ]; then TWEAK_NAME="YTKACE"; fi
        if [ -z "$DYLIB_FILES" ]; then DYLIB_FILES="YTKACE.dylib"; fi
        if [ -z "$BUNDLE_ZIPS" ]; then BUNDLE_ZIPS="YTKACE.bundle.zip"; fi
        if [ -z "$BUNDLE_ID" ]; then BUNDLE_ID="com.google.ios.youtube"; fi
        
        # Create tag name from inputs
        TAG_NAME="${TWEAK_NAME}-${PACKAGE_VERSION}"
        
        # Export all variables
        echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
        echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_ENV
        echo "MAINTAINER=${MAINTAINER}" >> $GITHUB_ENV
        echo "DESCRIPTION=${DESCRIPTION}" >> $GITHUB_ENV
        echo "TWEAK_NAME=${TWEAK_NAME}" >> $GITHUB_ENV
        echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
        echo "DYLIB_FILES=${DYLIB_FILES}" >> $GITHUB_ENV
        echo "BUNDLE_ZIPS=${BUNDLE_ZIPS}" >> $GITHUB_ENV
        echo "BUNDLE_ID=${BUNDLE_ID}" >> $GITHUB_ENV
        echo "BUILD_DIR=$(pwd)/build" >> $GITHUB_ENV
        echo "DEB_DIR=$(pwd)/debs" >> $GITHUB_ENV
        echo "EXTRACT_DIR=$(pwd)/extracted" >> $GITHUB_ENV
        
        echo "📊 Configuration:"
        echo "  Package Name: ${PACKAGE_NAME}"
        echo "  Package Version: ${PACKAGE_VERSION}"
        echo "  Tweak Name: ${TWEAK_NAME}"
        echo "  Tag Name: ${TAG_NAME}"
        echo "  Dylib Files: ${DYLIB_FILES}"
        echo "  Bundle Zips: ${BUNDLE_ZIPS}"
        echo "  Bundle ID: ${BUNDLE_ID}"

    - name: Create build directories
      run: |
        mkdir -p $BUILD_DIR
        mkdir -p $DEB_DIR
        mkdir -p $EXTRACT_DIR
        mkdir -p $BUILD_DIR/rootful/DEBIAN
        mkdir -p $BUILD_DIR/rootless/DEBIAN

    - name: List files (debug)
      run: |
        echo "📂 Files in repository:"
        ls -la
        echo ""
        echo "📦 Environment variables:"
        echo "  DYLIB_FILES: $DYLIB_FILES"
        echo "  BUNDLE_ZIPS: $BUNDLE_ZIPS"
        echo "  BUNDLE_ID: $BUNDLE_ID"
        echo "  TWEAK_NAME: $TWEAK_NAME"
        echo "  PACKAGE_VERSION: $PACKAGE_VERSION"
        echo "  TAG_NAME: $TAG_NAME"
        echo ""
        echo "📦 Checking if files exist:"
        IFS=' ' read -ra DYLIB_ARRAY <<< "$DYLIB_FILES"
        for dylib in "${DYLIB_ARRAY[@]}"; do
          if [ -f "$dylib" ]; then echo "  ✅ $dylib exists"; else echo "  ❌ $dylib NOT found"; fi
        done
        IFS=' ' read -ra ZIP_ARRAY <<< "$BUNDLE_ZIPS"
        for zip in "${ZIP_ARRAY[@]}"; do
          if [ -f "$zip" ]; then echo "  ✅ $zip exists"; else echo "  ❌ $zip NOT found"; fi
        done

    - name: Extract bundle zip files
      run: |
        echo "📦 Extracting bundle zip files..."
        
        IFS=' ' read -ra ZIP_ARRAY <<< "$BUNDLE_ZIPS"
        
        for zip in "${ZIP_ARRAY[@]}"; do
          if [ -z "$zip" ]; then
            echo "  ❌ ERROR: Bundle zip is empty!"
            exit 1
          fi
          
          if [ ! -f "$zip" ]; then
            echo "  ❌ ERROR: $zip not found!"
            echo "  Available files:"
            ls -la *.zip 2>/dev/null || echo "  No zip files found"
            exit 1
          fi
          
          echo "  Extracting: $zip"
          unzip -q "$zip" -d $EXTRACT_DIR/
          echo "  ✅ Extracted: $zip"
        done
        
        echo ""
        echo "📂 Extracted bundle directories:"
        find $EXTRACT_DIR -type d -name "*.bundle" 2>/dev/null | sed 's|.*/||' || echo "  (none)"

    - name: Copy dylib files
      run: |
        # Create necessary directories
        mkdir -p $BUILD_DIR/rootful/Library/MobileSubstrate/DynamicLibraries
        mkdir -p $BUILD_DIR/rootless/Library/MobileSubstrate/DynamicLibraries
        
        echo "📦 Copying dylib files..."
        DYLIB_COUNT=0
        DYLIB_NAMES=""
        MISSING_FILES=""
        
        IFS=' ' read -ra DYLIB_ARRAY <<< "$DYLIB_FILES"
        
        for dylib in "${DYLIB_ARRAY[@]}"; do
          if [ -f "$dylib" ]; then
            cp "$dylib" $BUILD_DIR/rootful/Library/MobileSubstrate/DynamicLibraries/
            cp "$dylib" $BUILD_DIR/rootless/Library/MobileSubstrate/DynamicLibraries/
            echo "  ✅ Copied: $dylib"
            DYLIB_COUNT=$((DYLIB_COUNT + 1))
            DYLIB_NAMES="${DYLIB_NAMES}  - ${dylib}\n"
          else
            echo "  ⚠️  WARNING: $dylib not found! Skipping..."
            MISSING_FILES="${MISSING_FILES}  - ${dylib}\n"
          fi
        done
        
        if [ $DYLIB_COUNT -eq 0 ]; then
          echo "  ❌ ERROR: No dylib files found to copy!"
          exit 1
        fi
        
        echo "DYLIB_COUNT=${DYLIB_COUNT}" >> $GITHUB_ENV
        echo -e "DYLIB_NAMES=${DYLIB_NAMES}" >> $GITHUB_ENV
        echo -e "MISSING_FILES=${MISSING_FILES}" >> $GITHUB_ENV

    - name: Copy bundle files
      run: |
        # Create necessary directories
        mkdir -p $BUILD_DIR/rootful/Library/PreferenceBundles
        mkdir -p $BUILD_DIR/rootless/Library/PreferenceBundles
        
        echo "📦 Copying bundle files..."
        BUNDLE_COUNT=0
        BUNDLE_NAMES=""
        
        # Find all extracted bundles
        for bundle in $(find $EXTRACT_DIR -type d -name "*.bundle" 2>/dev/null); do
          BUNDLE_NAME=$(basename "$bundle")
          cp -r "$bundle" $BUILD_DIR/rootful/Library/PreferenceBundles/
          cp -r "$bundle" $BUILD_DIR/rootless/Library/PreferenceBundles/
          echo "  ✅ Copied bundle: $BUNDLE_NAME"
          BUNDLE_COUNT=$((BUNDLE_COUNT + 1))
          BUNDLE_NAMES="${BUNDLE_NAMES}  - ${BUNDLE_NAME}\n"
        done
        
        if [ $BUNDLE_COUNT -eq 0 ]; then
          echo "  ❌ ERROR: No .bundle found in extracted files!"
          echo "  Extracted directory contents:"
          find $EXTRACT_DIR -type f 2>/dev/null | head -20
          exit 1
        fi
        
        echo "BUNDLE_COUNT=${BUNDLE_COUNT}" >> $GITHUB_ENV
        echo -e "BUNDLE_NAMES=${BUNDLE_NAMES}" >> $GITHUB_ENV

    - name: Generate plist files for each dylib
      run: |
        # Create necessary directories
        mkdir -p $BUILD_DIR/rootful/Library/MobileSubstrate/DynamicLibraries
        mkdir -p $BUILD_DIR/rootless/Library/MobileSubstrate/DynamicLibraries
        
        echo "📦 Generating plist files with bundle ID: $BUNDLE_ID"
        PLIST_COUNT=0
        PLIST_NAMES=""
        
        IFS=' ' read -ra DYLIB_ARRAY <<< "$DYLIB_FILES"
        
        for dylib in "${DYLIB_ARRAY[@]}"; do
          # Only generate plist if the dylib exists
          if [ -f "$dylib" ]; then
            DYLIB_NAME="${dylib%.dylib}"
            PLIST_FILE="${DYLIB_NAME}.plist"
            
            echo "  Generating: $PLIST_FILE"
            
            # Create plist file
            echo '<?xml version="1.0" encoding="UTF-8"?>' > "$PLIST_FILE"
            echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "$PLIST_FILE"
            echo '<plist version="1.0">' >> "$PLIST_FILE"
            echo '<dict>' >> "$PLIST_FILE"
            echo '	<key>Filter</key>' >> "$PLIST_FILE"
            echo '	<dict>' >> "$PLIST_FILE"
            echo '		<key>Bundles</key>' >> "$PLIST_FILE"
            echo '		<array>' >> "$PLIST_FILE"
            echo "			<string>${BUNDLE_ID}</string>" >> "$PLIST_FILE"
            echo '		</array>' >> "$PLIST_FILE"
            echo '	</dict>' >> "$PLIST_FILE"
            echo '</dict>' >> "$PLIST_FILE"
            echo '</plist>' >> "$PLIST_FILE"
            
            cp "$PLIST_FILE" $BUILD_DIR/rootful/Library/MobileSubstrate/DynamicLibraries/
            cp "$PLIST_FILE" $BUILD_DIR/rootless/Library/MobileSubstrate/DynamicLibraries/
            echo "  ✅ Generated: $PLIST_FILE"
            
            PLIST_COUNT=$((PLIST_COUNT + 1))
            PLIST_NAMES="${PLIST_NAMES}  - ${PLIST_FILE}\n"
          fi
        done
        
        echo "PLIST_COUNT=${PLIST_COUNT}" >> $GITHUB_ENV
        echo -e "PLIST_NAMES=${PLIST_NAMES}" >> $GITHUB_ENV

    - name: Show package contents
      run: |
        echo "📊 Package summary:"
        echo "  - Tweak Name: $TWEAK_NAME"
        echo "  - Package Version: $PACKAGE_VERSION"
        echo "  - Tag Name: $TAG_NAME"
        echo "  - Dylib files copied: $DYLIB_COUNT"
        echo "  - Bundle files: $BUNDLE_COUNT"
        echo "  - Plist files generated: $PLIST_COUNT"
        echo "  - Bundle ID: $BUNDLE_ID"
        if [ -n "$MISSING_FILES" ]; then
          echo ""
          echo "⚠️  Missing files (skipped):"
          echo -e "$MISSING_FILES"
        fi
        echo ""
        echo "📂 Rootful package contents:"
        find $BUILD_DIR/rootful -type f | sed "s|$BUILD_DIR/rootful||" | sort
        echo ""
        echo "📂 Rootless package contents:"
        find $BUILD_DIR/rootless -type f | sed "s|$BUILD_DIR/rootless||" | sort

    - name: Create rootful DEBIAN control file
      run: |
        cat > $BUILD_DIR/rootful/DEBIAN/control << EOF
        Package: ${{ env.PACKAGE_NAME }}
        Version: ${{ env.PACKAGE_VERSION }}
        Section: Tweaks
        Priority: optional
        Architecture: iphoneos-arm
        Maintainer: ${{ env.MAINTAINER }}
        Depends: firmware (>= 11.0), mobilesubstrate (>= 0.9.5000)
        Description: ${{ env.DESCRIPTION }}
        Name: ${{ env.TWEAK_NAME }}
        Author: ${{ env.MAINTAINER }}
        Installed-Size: $(du -sk $BUILD_DIR/rootful | cut -f1)
        EOF

    - name: Create rootless DEBIAN control file
      run: |
        cat > $BUILD_DIR/rootless/DEBIAN/control << EOF
        Package: ${{ env.PACKAGE_NAME }}
        Version: ${{ env.PACKAGE_VERSION }}
        Section: Tweaks
        Priority: optional
        Architecture: iphoneos-arm64
        Maintainer: ${{ env.MAINTAINER }}
        Depends: firmware (>= 11.0), ellekit (>= 1.0.0)
        Description: ${{ env.DESCRIPTION }} (Rootless)
        Name: ${{ env.TWEAK_NAME }}
        Author: ${{ env.MAINTAINER }}
        Installed-Size: $(du -sk $BUILD_DIR/rootless | cut -f1)
        EOF

    - name: Create rootful postinst script
      run: |
        cat > $BUILD_DIR/rootful/DEBIAN/postinst << 'EOF'
        #!/bin/sh
        
        echo "Setting permissions for dylib files..."
        for dylib in /Library/MobileSubstrate/DynamicLibraries/*.dylib; do
            if [ -f "$dylib" ]; then
                chmod 755 "$dylib"
                echo "  ✅ $(basename $dylib)"
            fi
        done
        
        echo "Setting permissions for bundle files..."
        for bundle in /Library/PreferenceBundles/*.bundle; do
            if [ -d "$bundle" ]; then
                chmod 755 "$bundle"
                find "$bundle" -type f -exec chmod 644 {} \; 2>/dev/null
                echo "  ✅ $(basename $bundle)"
            fi
        done
        
        echo "Respring SpringBoard..."
        killall -9 SpringBoard 2>/dev/null || true
        exit 0
        EOF
        chmod 755 $BUILD_DIR/rootful/DEBIAN/postinst

    - name: Create rootless postinst script
      run: |
        cat > $BUILD_DIR/rootless/DEBIAN/postinst << 'EOF'
        #!/bin/sh
        
        echo "Setting permissions for dylib files..."
        for dylib in /var/jb/Library/MobileSubstrate/DynamicLibraries/*.dylib; do
            if [ -f "$dylib" ]; then
                chmod 755 "$dylib"
                echo "  ✅ $(basename $dylib)"
            fi
        done
        
        echo "Setting permissions for bundle files..."
        for bundle in /var/jb/Library/PreferenceBundles/*.bundle; do
            if [ -d "$bundle" ]; then
                chmod 755 "$bundle"
                find "$bundle" -type f -exec chmod 644 {} \; 2>/dev/null
                echo "  ✅ $(basename $bundle)"
            fi
        done
        
        echo "Respring SpringBoard..."
        killall -9 SpringBoard 2>/dev/null || true
        exit 0
        EOF
        chmod 755 $BUILD_DIR/rootless/DEBIAN/postinst

    - name: Build rootful DEB package
      run: |
        dpkg-deb -b $BUILD_DIR/rootful $DEB_DIR/${TWEAK_NAME}_${PACKAGE_VERSION}_iphoneos-arm.deb

    - name: Build rootless DEB package
      run: |
        dpkg-deb -b $BUILD_DIR/rootless $DEB_DIR/${TWEAK_NAME}_${PACKAGE_VERSION}_iphoneos-arm64.deb

    - name: List built packages
      run: |
        echo "📦 Built packages:"
        ls -la $DEB_DIR/
        echo ""
        echo "📊 Package statistics:"
        echo "  - Tweak Name: $TWEAK_NAME"
        echo "  - Package Version: $PACKAGE_VERSION"
        echo "  - Tag Name: $TAG_NAME"
        echo "  - Dylibs included: $DYLIB_COUNT"
        echo "  - Bundles included: $BUNDLE_COUNT"
        echo "  - Plists generated: $PLIST_COUNT"
        echo "  - Bundle ID: $BUNDLE_ID"
        echo "  - Total package size: $(du -sh $DEB_DIR/ | cut -f1)"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ env.TWEAK_NAME }} v${{ env.PACKAGE_VERSION }}
        tag_name: ${{ env.TAG_NAME }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ${{ env.DEB_DIR }}/*.deb
        body: ""
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}