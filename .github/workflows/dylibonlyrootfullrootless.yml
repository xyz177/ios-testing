name: Build from dylib - Rootfull & Rootless + Release
on:
  workflow_dispatch:

env:
  TWEAK_NAME: YTDownloadManager
  PACKAGE_ID: com.youtube.ytdm
  VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dylib exists
        run: ls -la ${{ env.TWEAK_NAME }}.dylib

      # ========== GENERATE ytkace.plist FOR YOUTUBE ==========
      - name: Generate ${{ env.TWEAK_NAME }}.plist
        run: |
          cat > ${{ env.TWEAK_NAME }}.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>Filter</key>
              <dict>
                  <key>Bundles</key>
                  <array>
                      <string>com.google.ios.youtube</string>
                  </array>
              </dict>
          </dict>
          </plist>
          EOF

      # ========== ROOTFUL - dylib only ==========
      - name: Create Rootful structure
        run: |
          mkdir -p ${{ env.TWEAK_NAME }}-rootful/DEBIAN
          mkdir -p ${{ env.TWEAK_NAME }}-rootful/Library/MobileSubstrate/DynamicLibraries

      - name: Copy files Rootful
        run: |
          cp ${{ env.TWEAK_NAME }}.dylib ${{ env.TWEAK_NAME }}-rootful/Library/MobileSubstrate/DynamicLibraries/
          cp ${{ env.TWEAK_NAME }}.plist ${{ env.TWEAK_NAME }}-rootful/Library/MobileSubstrate/DynamicLibraries/

      - name: Create control Rootful
        run: |
          cat > ${{ env.TWEAK_NAME }}-rootful/DEBIAN/control << EOF
          Package: ${{ env.PACKAGE_ID }}
          Name: ${{ env.TWEAK_NAME }}
          Version: ${{ env.VERSION }}
          Architecture: iphoneos-arm
          Description: ${{ env.TWEAK_NAME }} tweak for YouTube - dylib only
          Maintainer: xyz177
          Section: Tweaks
          Depends: mobilesubstrate
          EOF

      - name: Build Rootful DEB
        run: dpkg-deb -b ${{ env.TWEAK_NAME }}-rootful ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_iphoneos-arm.deb

      - name: Fix DEB ownership and permissions
        run: |
          sudo chown $USER:$USER *.deb
          chmod 644 *.deb
          ls -l *.deb

      # ========== ROOTLESS - dylib only ==========
      - name: Create Rootless structure
        run: |
          mkdir -p ${{ env.TWEAK_NAME }}-rootless/DEBIAN
          mkdir -p ${{ env.TWEAK_NAME }}-rootless/var/jb/Library/MobileSubstrate/DynamicLibraries

      - name: Copy files Rootless
        run: |
          cp ${{ env.TWEAK_NAME }}.dylib ${{ env.TWEAK_NAME }}-rootless/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp ${{ env.TWEAK_NAME }}.plist ${{ env.TWEAK_NAME }}-rootless/var/jb/Library/MobileSubstrate/DynamicLibraries/

      - name: Create control Rootless
        run: |
          cat > ${{ env.TWEAK_NAME }}-rootless/DEBIAN/control << EOF
          Package: ${{ env.PACKAGE_ID }}.rootless
          Name: ${{ env.TWEAK_NAME }} (Rootless)
          Version: ${{ env.VERSION }}
          Architecture: iphoneos-arm64
          Description: ${{ env.TWEAK_NAME }} tweak for YouTube - Rootless dylib only
          Maintainer: joe
          Section: Tweaks
          Depends: mobilesubstrate
          EOF

      - name: Build Rootless DEB
        run: dpkg-deb -b ${{ env.TWEAK_NAME }}-rootless ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_rootless_iphoneos-arm64.deb

      - name: Fix DEB ownership and permissions
        run: |
          sudo chown $USER:$USER *.deb
          chmod 644 *.deb
          ls -l *.deb

      # ========== UPLOAD TO ARTIFACTS ==========
      #- name: Upload DEBs
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: ${{ env.TWEAK_NAME }}-v${{ env.VERSION }}-dylib-only
      #    path: |
      #      ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_iphoneos-arm.deb
      #      ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_rootless_iphoneos-arm64.deb
      #    retention-days: 1

      # Upload to release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: YTDM
          name: ${{ env.TWEAK_NAME }} v${{ env.VERSION }}
          files: |
            ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_iphoneos-arm.deb
            ${{ env.TWEAK_NAME }}_${{ env.VERSION }}_rootless_iphoneos-arm64.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
