name: Delete Multiple Files
on:
  workflow_dispatch:
    inputs:
      files_to_delete:
        description: 'List files to delete, separated by commas. Ex: bro.txt, test.log, build/'
        required: true
        type: string
        default: ''
      confirm:
        description: 'Type DELETE to confirm'
        required: true
        type: string

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert commas to new lines
        id: files
        run: |
          list=$(echo '${{ inputs.files_to_delete }}' | tr ',' '\n' | sed 's/^ *//;s/ *$//')
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$list" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Show what will be deleted
        run: |
          echo "Files marked for deletion:"
          echo "${{ steps.files.outputs.list }}"
          [ "${{ inputs.confirm }}" = "DELETE" ] || { echo "Aborted"; exit 1; }

      - name: Remove Files
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            rm -rf "$file"
            echo "Deleted: $file"
          done <<< "${{ steps.files.outputs.list }}"

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A 
          git commit -m "chore: delete files via workflow" || echo "No changes"
          git push